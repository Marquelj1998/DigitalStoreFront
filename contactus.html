<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - MJ Comics</title>

  <!-- My Link ForBootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Header -->
<header class="bg-dark text-white p-3 text-center">
  <h1>MJ's Digital Comic Store</h1>
  <nav>
    <a href="index.html" class="text-white me-3">Home</a>
    <a href="products.html" class="text-white me-3">Products</a>
    <a href="about.html" class="text-white me-3">About</a>
    <a href="contactus.html" class="text-white">Contact</a>
  </nav>
</header>

<!-- Hero -->
<section class="bg-success text-white text-center py-5">
  <h2>Contact Us</h2>
  <p>Have questions? Send us a message!</p>
</section>

<!-- Form Section -->
<main class="container my-5">

  <section class="mx-auto" style="max-width: 500px;">
    
    <form action="#" method="post" class="bg-white p-4 shadow rounded">

      <label class="form-label">Full Name:</label>
      <input type="text" name="name" class="form-control mb-3" required>

      <label class="form-label">Email Address:</label>
      <input type="email" name="email" class="form-control mb-3" required>

      <label class="form-label">Subject:</label>
      <input type="text" name="subject" class="form-control mb-3">

      <label class="form-label">Message:</label>
      <textarea name="message" rows="5" class="form-control mb-3" required></textarea>

      <button type="submit" class="btn btn-success w-100">Send Message</button>

    </form>

  </section>

</main>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
  <p>Contact: mjcomics@email.com</p>
  <p>© 2026 MJ Comics</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
